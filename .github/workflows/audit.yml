name: SEO Audit CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run SEO audit
        run: npx ts-node audit.ts

      - name: Upload CSV report
        uses: actions/upload-artifact@v3
        with:
          name: seo-audit-report
          path: seo-audit-report.csv